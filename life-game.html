<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Conway's Game of Life - 小白的宇宙</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0a1a;
            --panel-bg: rgba(15, 15, 35, 0.9);
            --pink-400: #f06292;
            --pink-500: #ec407a;
            --pink-600: #e91e63;
            --pink-glow: rgba(233, 30, 99, 0.6);
            --cyan-400: #4dd0e1;
            --cyan-glow: rgba(77, 208, 225, 0.4);
            --text: #e0e0e0;
            --text-dim: #888;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(233, 30, 99, 0.2);
        }

        .header h1 {
            font-size: 1.2em;
            color: var(--pink-400);
        }

        .header h1 span {
            color: var(--cyan-400);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 0.85em;
            color: var(--text-dim);
        }

        .stats-bar .val {
            color: var(--pink-400);
            font-weight: 600;
        }

        /* Canvas */
        #canvas {
            flex: 1;
            cursor: crosshair;
        }

        /* Control Panel */
        .panel {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(233, 30, 99, 0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }

        .btn {
            padding: 8px 18px;
            border: 1px solid var(--pink-500);
            border-radius: 12px;
            background: rgba(233, 30, 99, 0.15);
            color: var(--pink-400);
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .btn:hover {
            background: rgba(233, 30, 99, 0.3);
            box-shadow: 0 0 16px var(--pink-glow);
        }

        .btn.active {
            background: var(--pink-500);
            color: white;
        }

        .btn-icon {
            padding: 8px 14px;
            font-size: 1.1em;
        }

        .separator {
            width: 1px;
            height: 28px;
            background: rgba(255,255,255,0.1);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85em;
            color: var(--text-dim);
        }

        .slider-group input[type="range"] {
            width: 80px;
            accent-color: var(--pink-500);
        }

        .color-swatch {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-swatch:hover, .color-swatch.active {
            border-color: white;
            transform: scale(1.2);
        }

        /* Pattern Menu */
        .pattern-menu {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: none;
            flex-wrap: wrap;
            gap: 8px;
            max-width: 500px;
            justify-content: center;
            padding: 16px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid rgba(233, 30, 99, 0.2);
        }

        .pattern-menu.show {
            display: flex;
        }

        .pattern-btn {
            padding: 6px 14px;
            border: 1px solid rgba(77, 208, 225, 0.3);
            border-radius: 8px;
            background: rgba(77, 208, 225, 0.1);
            color: var(--cyan-400);
            font-size: 0.8em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .pattern-btn:hover {
            background: rgba(77, 208, 225, 0.25);
            box-shadow: 0 0 12px var(--cyan-glow);
        }

        /* Hint */
        .hint {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            padding: 8px 20px;
            background: rgba(77, 208, 225, 0.15);
            border: 1px solid rgba(77, 208, 225, 0.3);
            border-radius: 12px;
            font-size: 0.85em;
            color: var(--cyan-400);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .hint.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🌸 Game of Life <span>| 小白的宇宙</span></h1>
        <div class="stats-bar">
            <span>世代: <span class="val" id="gen-count">0</span></span>
            <span>生物: <span class="val" id="pop-count">0</span></span>
            <span>FPS: <span class="val" id="fps-display">0</span></span>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <div class="hint" id="hint"></div>

    <div class="pattern-menu" id="pattern-menu">
        <div class="pattern-btn" data-pattern="glider">🚀 Glider</div>
        <div class="pattern-btn" data-pattern="lwss">🛸 LWSS</div>
        <div class="pattern-btn" data-pattern="pulsar">💫 Pulsar</div>
        <div class="pattern-btn" data-pattern="pentadecathlon">🔄 Pentadecathlon</div>
        <div class="pattern-btn" data-pattern="rpentomino">🎲 R-Pentomino</div>
        <div class="pattern-btn" data-pattern="acorn">🌰 Acorn</div>
        <div class="pattern-btn" data-pattern="diehard">💀 Diehard</div>
        <div class="pattern-btn" data-pattern="gosper">🔫 Gosper Gun</div>
        <div class="pattern-btn" data-pattern="heart">💕 Heart</div>
        <div class="pattern-btn" data-pattern="xiaobai">🌸 小白</div>
    </div>

    <div class="panel">
        <button class="btn btn-icon active" id="btn-play" title="Play/Pause">▶</button>
        <button class="btn btn-icon" id="btn-step" title="Step">⏭</button>
        <button class="btn btn-icon" id="btn-clear" title="Clear">✕</button>
        <button class="btn btn-icon" id="btn-random" title="Random">🎲</button>
        <div class="separator"></div>
        <button class="btn" id="btn-patterns" title="Patterns">🧩 图案</button>
        <div class="separator"></div>
        <div class="slider-group">
            <span>速度</span>
            <input type="range" id="speed-slider" min="1" max="60" value="15">
        </div>
        <div class="slider-group">
            <span>大小</span>
            <input type="range" id="size-slider" min="2" max="12" value="4">
        </div>
        <div class="separator"></div>
        <div class="color-swatch active" data-theme="sakura" style="background: linear-gradient(135deg, #ec407a, #f48fb1)" title="樱花"></div>
        <div class="color-swatch" data-theme="neon" style="background: linear-gradient(135deg, #00e5ff, #76ff03)" title="霓虹"></div>
        <div class="color-swatch" data-theme="fire" style="background: linear-gradient(135deg, #ff6d00, #ffea00)" title="火焰"></div>
        <div class="color-swatch" data-theme="ocean" style="background: linear-gradient(135deg, #1a237e, #4fc3f7)" title="海洋"></div>
    </div>

    <script>
    // ============================================
    // Conway's Game of Life - 小白的宇宙
    // ============================================

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // State
    let cellSize = 4;
    let cols, rows;
    let grid, nextGrid;
    let generation = 0;
    let population = 0;
    let running = true;
    let fps = 0;
    let frameCount = 0;
    let lastFpsTime = Date.now();
    let speed = 15; // frames per second target
    let lastFrameTime = 0;
    let mouseDown = false;
    let mouseButton = 0;

    // Color themes
    const themes = {
        sakura: {
            bg: '#0a0a1a',
            alive: ['#ec407a', '#f48fb1', '#f06292', '#e91e63'],
            glow: 'rgba(233, 30, 99, 0.4)',
            grid: 'rgba(233, 30, 99, 0.05)',
            age: (age) => `rgba(233, 30, 99, ${Math.min(0.3 + age * 0.05, 0.9)})`
        },
        neon: {
            bg: '#0a1a0a',
            alive: ['#76ff03', '#00e5ff', '#b2ff59', '#64ffda'],
            glow: 'rgba(118, 255, 3, 0.4)',
            grid: 'rgba(118, 255, 3, 0.05)',
            age: (age) => `rgba(118, 255, 3, ${Math.min(0.3 + age * 0.05, 0.9)})`
        },
        fire: {
            bg: '#1a0a0a',
            alive: ['#ff6d00', '#ff9100', '#ffea00', '#ff3d00'],
            glow: 'rgba(255, 109, 0, 0.4)',
            grid: 'rgba(255, 109, 0, 0.05)',
            age: (age) => `rgba(255, 109, 0, ${Math.min(0.3 + age * 0.05, 0.9)})`
        },
        ocean: {
            bg: '#0a0a1a',
            alive: ['#4fc3f7', '#29b6f6', '#03a9f4', '#1a237e'],
            glow: 'rgba(79, 195, 247, 0.4)',
            grid: 'rgba(79, 195, 247, 0.05)',
            age: (age) => `rgba(79, 195, 247, ${Math.min(0.3 + age * 0.05, 0.9)})`
        }
    };

    let currentTheme = 'sakura';

    // Age tracking (how many generations a cell has been alive)
    let ages;

    // Initialize
    function init() {
        resize();
        randomize();
        requestAnimationFrame(loop);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        cols = Math.ceil(canvas.width / cellSize);
        rows = Math.ceil(canvas.height / cellSize);
        
        const oldGrid = grid;
        const oldAges = ages;
        grid = new Uint8Array(cols * rows);
        ages = new Int8Array(cols * rows);
        nextGrid = new Uint8Array(cols * rows);
        
        if (oldGrid) {
            const oldCols = Math.ceil((oldGrid.length / rows) || 1);
            for (let y = 0; y < Math.min(rows, oldGrid.length / oldCols); y++) {
                for (let x = 0; x < Math.min(cols, oldCols); x++) {
                    const idx = y * cols + x;
                    const oldIdx = y * oldCols + x;
                    grid[idx] = oldGrid[oldIdx];
                    ages[idx] = oldAges[oldIdx];
                }
            }
        }
    }

    function idx(x, y) { return y * cols + x; }

    function randomize() {
        generation = 0;
        for (let i = 0; i < grid.length; i++) {
            grid[i] = Math.random() < 0.25 ? 1 : 0;
            ages[i] = grid[i] ? Math.floor(Math.random() * 5) : 0;
        }
        showHint('🎲 随机初始化完成');
    }

    function clear() {
        grid.fill(0);
        ages.fill(0);
        generation = 0;
        showHint('✕ 宇宙清空');
    }

    // Game of Life step
    function step() {
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                const i = idx(x, y);
                let neighbors = 0;
                
                for (let dy = -1; dy <= 1; dy++) {
                    for (let dx = -1; dx <= 1; dx++) {
                        if (dx === 0 && dy === 0) continue;
                        const nx = (x + dx + cols) % cols;
                        const ny = (y + dy + rows) % rows;
                        neighbors += grid[idx(nx, ny)];
                    }
                }
                
                const alive = grid[i];
                if (alive) {
                    nextGrid[i] = (neighbors === 2 || neighbors === 3) ? 1 : 0;
                    if (nextGrid[i]) ages[i]++;
                    else ages[i] = 0;
                } else {
                    nextGrid[i] = (neighbors === 3) ? 1 : 0;
                    if (nextGrid[i]) ages[i] = 1;
                }
            }
        }
        
        [grid, nextGrid] = [nextGrid, grid];
        generation++;
    }

    // Render
    function render() {
        const theme = themes[currentTheme];
        
        // Background
        ctx.fillStyle = theme.bg;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Grid lines (subtle)
        if (cellSize >= 4) {
            ctx.strokeStyle = theme.grid;
            ctx.lineWidth = 0.5;
            for (let x = 0; x <= cols; x++) {
                ctx.beginPath();
                ctx.moveTo(x * cellSize, 0);
                ctx.lineTo(x * cellSize, canvas.height);
                ctx.stroke();
            }
            for (let y = 0; y <= rows; y++) {
                ctx.beginPath();
                ctx.moveTo(0, y * cellSize);
                ctx.lineTo(canvas.width, y * cellSize);
                ctx.stroke();
            }
        }
        
        // Cells
        let pop = 0;
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (grid[idx(x, y)]) {
                    pop++;
                    const age = ages[idx(x, y)];
                    const colorIdx = age % theme.alive.length;
                    ctx.fillStyle = theme.alive[colorIdx];
                    
                    const padding = cellSize > 3 ? 0.5 : 0;
                    ctx.fillRect(
                        x * cellSize + padding,
                        y * cellSize + padding,
                        cellSize - padding * 2,
                        cellSize - padding * 2
                    );
                    
                    // Glow for older cells
                    if (age > 3 && cellSize >= 4) {
                        ctx.fillStyle = theme.glow;
                        ctx.fillRect(
                            x * cellSize - 1,
                            y * cellSize - 1,
                            cellSize + 2,
                            cellSize + 2
                        );
                    }
                }
            }
        }
        population = pop;
    }

    // Main loop
    function loop(timestamp) {
        // FPS calculation
        frameCount++;
        if (timestamp - lastFpsTime >= 1000) {
            fps = frameCount;
            frameCount = 0;
            lastFpsTime = timestamp;
        }
        
        // Speed control
        const interval = 1000 / speed;
        if (timestamp - lastFrameTime >= interval) {
            if (running) step();
            lastFrameTime = timestamp;
        }
        
        render();
        updateStats();
        requestAnimationFrame(loop);
    }

    function updateStats() {
        document.getElementById('gen-count').textContent = generation.toLocaleString();
        document.getElementById('pop-count').textContent = population.toLocaleString();
        document.getElementById('fps-display').textContent = fps;
    }

    // Hint
    function showHint(text) {
        const hint = document.getElementById('hint');
        hint.textContent = text;
        hint.classList.add('show');
        setTimeout(() => hint.classList.remove('show'), 2000);
    }

    // Mouse interaction
    canvas.addEventListener('mousedown', (e) => {
        mouseDown = true;
        mouseButton = e.button;
        toggleCell(e);
    });

    canvas.addEventListener('mousemove', (e) => {
        if (mouseDown) toggleCell(e);
    });

    canvas.addEventListener('mouseup', () => { mouseDown = false; });
    canvas.addEventListener('mouseleave', () => { mouseDown = false; });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        mouseDown = true;
        toggleCell(e.touches[0]);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        if (mouseDown) toggleCell(e.touches[0]);
    }, { passive: false });

    canvas.addEventListener('touchend', () => { mouseDown = false; });

    function toggleCell(e) {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor((e.clientX - rect.left) / cellSize);
        const y = Math.floor((e.clientY - rect.top) / cellSize);
        if (x >= 0 && x < cols && y >= 0 && y < rows) {
            const i = idx(x, y);
            if (mouseButton === 2) {
                grid[i] = 0; // right click kills
            } else {
                grid[i] = grid[i] ? 0 : 1;
                ages[i] = grid[i] ? 1 : 0;
            }
        }
    }

    // Context menu
    canvas.addEventListener('contextmenu', (e) => e.preventDefault());

    // Buttons
    document.getElementById('btn-play').addEventListener('click', () => {
        running = !running;
        const btn = document.getElementById('btn-play');
        btn.textContent = running ? '▶' : '⏸';
        btn.classList.toggle('active', running);
        showHint(running ? '▶ 继续演化' : '⏸ 暂停');
    });

    document.getElementById('btn-step').addEventListener('click', () => {
        running = false;
        document.getElementById('btn-play').textContent = '⏸';
        document.getElementById('btn-play').classList.remove('active');
        step();
        showHint('⏭ 前进一代');
    });

    document.getElementById('btn-clear').addEventListener('click', clear);
    document.getElementById('btn-random').addEventListener('click', randomize);

    // Speed slider
    document.getElementById('speed-slider').addEventListener('input', (e) => {
        speed = parseInt(e.target.value);
    });

    // Size slider
    document.getElementById('size-slider').addEventListener('input', (e) => {
        cellSize = parseInt(e.target.value);
        resize();
    });

    // Color themes
    document.querySelectorAll('.color-swatch').forEach(swatch => {
        swatch.addEventListener('click', () => {
            document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
            swatch.classList.add('active');
            currentTheme = swatch.dataset.theme;
            showHint(`🎨 主题: ${swatch.title}`);
        });
    });

    // Patterns
    const patterns = {
        glider: [[0,1],[1,2],[2,0],[2,1],[2,2]],
        lwss: [[0,1],[0,3],[1,4],[2,0],[2,4],[3,0],[3,1],[3,2],[3,3]],
        pulsar: (function() {
            const p = [];
            const rows = [
                [2,3,4,8,9,10],
                [2,3,4,8,9,10],
                [2,3,4,8,9,10],
                [0,1,6,7,12,13],
                [0,1,6,7,12,13],
                [0,1,6,7,12,13],
                [2,3,4,8,9,10],
                [2,3,4,8,9,10],
                [2,3,4,8,9,10]
            ];
            rows.forEach((r, y) => r.forEach(x => p.push([x, y])));
            return p;
        })(),
        pentadecathlon: [[0,0],[1,0],[2,-1],[2,1],[3,0],[4,0],[5,0],[6,0],[7,-1],[7,1],[8,0],[9,0]],
        rpentomino: [[1,0],[2,0],[0,1],[1,1],[1,2]],
        acorn: [[1,0],[3,1],[0,2],[1,2],[4,2],[5,2],[6,2]],
        diehard: [[6,0],[0,1],[1,1],[1,2],[5,2],[6,2],[7,2]],
        gosper: (function() {
            const g = [];
            const rows = [
                [24],
                [22,24],
                [12,13,20,21,34,35],
                [11,14,20,21,34,35],
                [0,1,10,16,20,21,34,35],
                [0,1,10,14,15,22,24],
                [10,14,15,24],
                [10,16],
                [11],
                [0,1],
                [0,1],
                [4]
            ];
            rows.forEach((r, y) => r.forEach(x => g.push([x, y])));
            return g;
        })(),
        heart: (function() {
            const h = [];
            // Heart shape made of alive cells
            const shape = [
                "  ****  ****  ",
                " ********** **",
                "************ *",
                "************* ",
                "************  ",
                "  ********    ",
                "   ****      "
            ];
            shape.forEach((row, y) => {
                for (let x = 0; x < row.length; x++) {
                    if (row[x] === '*') h.push([x, y]);
                }
            });
            return h;
        })(),
        xiaobai: (function() {
            const x = [];
            const shape = [
                "  ****  ",
                " *    * ",
                " * OO * ",
                "  *^^*  ",
                "  *  *  ",
                " *    * ",
                "  ****  ",
                "    *   ",
                "   ***  ",
                "    *   "
            ];
            shape.forEach((row, y) => {
                for (let cx = 0; cx < row.length; cx++) {
                    if (row[cx] !== ' ') x.push([cx, y]);
                }
            });
            return x;
        })()
    };

    // Pattern placement
    document.getElementById('btn-patterns').addEventListener('click', () => {
        const menu = document.getElementById('pattern-menu');
        menu.classList.toggle('show');
    });

    document.querySelectorAll('.pattern-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const name = btn.dataset.pattern;
            const pattern = patterns[name];
            if (!pattern) return;
            
            // Place in center
            const cx = Math.floor(cols / 2) - Math.floor(Math.max(...pattern.map(p => p[0])) / 2);
            const cy = Math.floor(rows / 2) - Math.floor(Math.max(...pattern.map(p => p[1])) / 2);
            
            pattern.forEach(([px, py]) => {
                const x = cx + px;
                const y = cy + py;
                if (x >= 0 && x < cols && y >= 0 && y < rows) {
                    grid[idx(x, y)] = 1;
                    ages[idx(x, y)] = 1;
                }
            });
            
            document.getElementById('pattern-menu').classList.remove('show');
            showHint(`🧩 放置: ${btn.textContent}`);
        });
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        if (e.key === ' ') {
            e.preventDefault();
            document.getElementById('btn-play').click();
        } else if (e.key === 'n') {
            document.getElementById('btn-step').click();
        } else if (e.key === 'r') {
            document.getElementById('btn-random').click();
        } else if (e.key === 'c') {
            document.getElementById('btn-clear').click();
        } else if (e.key === 'Escape') {
            document.getElementById('pattern-menu').classList.remove('show');
        }
    });

    // Resize
    window.addEventListener('resize', resize);

    // Start
    init();
    showHint('🌸 点击绘制 | 右键擦除 | 空格暂停');
    </script>

</body>
</html>
